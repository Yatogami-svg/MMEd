name: Scrape Rules

on:
  schedule:
    - cron: '0 5 * * *'  # каждый день в 5 утра UTC
  workflow_dispatch:     # ручной запуск

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: python parser.py

      - name: Commit and push changes
        uses: step-security/git-auto-commit-action@v5
        with:
          commit_message: "Автоматическое обновление правил"
          file_pattern: rules.json
